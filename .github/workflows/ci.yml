name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v4
        with:
          enable-cache: true

      # robot (reachy_mini -> pygobject -> pycairo) needs system cairo/
      # gobject-introspection dev headers only present on dgx1 (see
      # docs/adr/0005 and pyproject.toml) — --all-groups pulled it in here
      # too and broke pycairo's build on the plain ubuntu-latest runner.
      # dev is uv's default group, so plain `uv sync` is enough for CI.
      - name: Install dependencies
        run: uv sync

      - name: Lint (ruff check)
        run: uv run ruff check .

      - name: Format check (ruff format)
        run: uv run ruff format --check .

      - name: Type check (mypy)
        run: uv run mypy src

      # No GPU/model servers in CI — integration tests need real hardware
      # and are run manually on the DGX Spark.
      - name: Unit tests
        run: uv run pytest -m "not integration"
